<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>一人公司孵化营 | 永久福利与全球企业库</title>
    <!-- Font Awesome 6 (保留图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== 全局样式 & 重置 — 更紧凑的整体基调 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f4f7fc;
            color: #1e2a3e;
            line-height: 1.4;          /* 行距略微收紧 */
            padding: 0 16px 24px;       /* 更紧凑的四周留白 */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1300px;           /* 稍微收窄最大宽度，信息更聚合 */
            margin: 0 auto;
            width: 100%;
        }

        /* ========== 底部福利区域 — 紧凑但信息丰满 ========== */
        .benefits-footer {
            margin-top: 1.2rem;          /* 缩减顶部间距 */
            background: linear-gradient(135deg, #ffffff 0%, #f8fafd 100%);
            border-radius: 28px;          /* 圆角略微精致但不过大 */
            padding: 1.2rem 1rem 1.5rem;  /* 内部留白更紧凑 */
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            border: 1px solid #e2edf7;
            transition: all 0.2s;
        }

        .benefits-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;                    /* 标题内部间距收紧 */
            font-size: 1.35rem;          /* 从1.6rem调小，更紧凑 */
            font-weight: 700;
            color: #1a4c6e;
            margin-bottom: 1.2rem;       /* 标题下方间距缩小 */
            flex-wrap: wrap;
            text-align: center;
            letter-spacing: -0.2px;
        }
        .benefits-title i {
            font-size: 1.7rem;           /* 图标略收 */
            color: #f5b042;
        }
        .benefits-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;                   /* 卡片间隙更紧凑 (原1.8rem) */
            margin-bottom: 1.4rem;
        }
        .benefit-card {
            flex: 1;
            min-width: 190px;            /* 略微紧缩最小宽度 */
            background: white;
            border-radius: 24px;
            padding: 1rem 0.75rem;       /* 内部留白减小 */
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            border: 1px solid #eef2f8;
            transition: transform 0.2s, border-color 0.2s;
        }
        .benefit-card:hover {
            transform: translateY(-3px);
            border-color: #cde0ed;
            box-shadow: 0 6px 14px rgba(0,0,0,0.04);
        }
        .benefit-icon {
            font-size: 2rem;             /* 图标稍微缩小 */
            color: #1f6392;
            margin-bottom: 0.7rem;
        }
        .benefit-card h4 {
            font-size: 1.05rem;          /* 标题字号紧凑 */
            font-weight: 700;
            color: #0f3b54;
            margin-bottom: 0.4rem;
        }
        .benefit-card p {
            font-size: 0.82rem;          /* 描述文字更精致 */
            color: #4a6f8a;
            line-height: 1.35;
        }
        .benefits-cta {
            text-align: center;
            margin-top: 0.2rem;
        }
        .benefits-cta a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1f6392;
            color: white;
            padding: 8px 22px;           /* 按钮更紧凑，但保持可点区域 */
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(31,99,146,0.2);
            cursor: pointer;
            letter-spacing: 0.3px;
        }
        .benefits-cta a:hover {
            background: #0e4f74;
            transform: scale(1.01);
        }
        .copyright-row {
            text-align: center;
            margin-top: 1rem;             /* 减少上边距 */
            padding-top: 0.9rem;
            border-top: 1px solid #dce5ec;
            font-size: 0.72rem;           /* 版权信息字体收拢 */
            color: #6b8eaa;
            line-height: 1.4;
        }

        /* ========== 模态框 — 保持整洁紧凑，轻量化 ========== */
        .payment-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background: #fff;
            max-width: 360px;             /* 稍微缩窄，更聚合 */
            width: 90%;
            border-radius: 28px;
            text-align: center;
            padding: 1.2rem 1rem 1.6rem;  /* 上下左右更紧凑 */
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            position: relative;
            animation: fadeInUp 0.2s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 1.4rem;
            cursor: pointer;
            color: #8b9aab;
            transition: color 0.2s;
            line-height: 1;
        }
        .modal-close:hover {
            color: #1f6392;
        }
        .modal-icon {
            font-size: 2.1rem;
            color: #2c7cb6;
            margin-bottom: 0.4rem;
        }
        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a4c6e;
            margin-bottom: 0.4rem;
            line-height: 1.3;
        }
        .qr-container {
            background: #ffffff;
            padding: 8px;                /* 更紧凑的二维码背景留白 */
            border-radius: 20px;
            margin: 0.8rem auto;
            display: inline-block;
            border: 1px solid #eef2f8;
        }
        .qr-img {
            width: 180px;               /* 二维码尺寸紧凑但扫码无碍 */
            height: 180px;
            display: block;
            margin: 0 auto;
            background: #f8fafc;
            border-radius: 14px;
            object-fit: cover;
        }
        .wechat-id {
            background: #f1f5f9;
            border-radius: 48px;
            padding: 6px 14px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e4663;
            margin: 0.6rem 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        .wechat-id i {
            font-size: 1.1rem;
            color: #2c9b77;
        }
        .copy-btn {
            background: #eef2f6;
            border: none;
            padding: 4px 10px;
            border-radius: 32px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
            color: #1f6392;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .copy-btn:hover {
            background: #d4dfe8;
        }
        .modal-note {
            font-size: 0.7rem;
            color: #6b8eaa;
            margin-top: 10px;
            line-height: 1.3;
        }

        /* ========== 响应式优化：移动端更紧凑 ========== */
        @media (max-width: 640px) {
            body {
                padding: 0 12px 16px;
            }
            .benefits-footer {
                padding: 1rem 0.9rem 1.2rem;
                margin-top: 0.8rem;
            }
            .benefits-title {
                font-size: 1.2rem;
                gap: 6px;
                margin-bottom: 1rem;
            }
            .benefits-title i {
                font-size: 1.4rem;
            }
            .benefits-grid {
                gap: 0.85rem;
                flex-direction: column;
                align-items: center;
            }
            .benefit-card {
                width: 100%;
                max-width: 300px;
                padding: 0.85rem 0.6rem;
            }
            .benefit-icon {
                font-size: 1.8rem;
                margin-bottom: 0.5rem;
            }
            .benefit-card h4 {
                font-size: 1rem;
            }
            .benefit-card p {
                font-size: 0.75rem;
            }
            .benefits-cta a {
                padding: 6px 18px;
                font-size: 0.85rem;
            }
            .copyright-row {
                font-size: 0.65rem;
                margin-top: 0.8rem;
                padding-top: 0.7rem;
            }
            .modal-content {
                max-width: 320px;
                padding: 1rem 0.9rem 1.4rem;
            }
            .qr-img {
                width: 150px;
                height: 150px;
            }
            .wechat-id {
                font-size: 0.8rem;
                padding: 4px 12px;
                gap: 6px;
            }
            .modal-title {
                font-size: 1.05rem;
            }
        }

        @media (max-width: 480px) {
            .qr-img {
                width: 130px;
                height: 130px;
            }
            .modal-content {
                padding: 0.9rem 0.8rem 1.2rem;
            }
            .wechat-id {
                font-size: 0.75rem;
            }
            .benefits-title {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- ================= 一人公司孵化营福利区块（紧凑但精致） ================= -->
    <div class="benefits-footer">
        <div class="benefits-title">
            <i class="fas fa-rocket"></i> 
            <span>加入一人公司孵化营，获得3大永久福利</span>
            <i class="fas fa-gem"></i>
        </div>
        <div class="benefits-grid">
            <div class="benefit-card">
                <div class="benefit-icon"><i class="fas fa-infinity"></i></div>
                <h4>永久免费使用token</h4>
                <p>AI调用额度永不过期，赋能一人公司自动化运营</p>
            </div>
            <div class="benefit-card">
                <div class="benefit-icon"><i class="fas fa-database"></i></div>
                <h4>共享全球企业信息库</h4>
                <p>海量海外企业名录、海关数据实时更新，精准拓客</p>
            </div>
            <div class="benefit-card">
                <div class="benefit-icon"><i class="fas fa-microchip"></i></div>
                <h4>一人公司全套AI系统及主机</h4>
                <p>轻量化AI工具链 + 本地主机，零基础快速起步</p>
            </div>
        </div>
        <div class="benefits-cta">
            <a id="openPaymentModalBtn"><i class="fas fa-hand-peace"></i> 立即了解详情 →</a>
        </div>
        <div class="copyright-row">
            <i class="fas fa-chart-line"></i> 数据持续更新 · 链接直达全球名录 · 建议配合LinkedIn/谷歌深度背调<br>
            © 外贸拓客工具集 | 助您精准开发全球客户
        </div>
    </div>
</div>

<!-- 微信收款码 + 微信号 模态框（点击按钮弹出，保留完整功能，紧凑设计） -->
<div id="paymentModal" class="payment-modal">
    <div class="modal-content">
        <span class="modal-close" id="closeModalBtn">&times;</span>
        <div class="modal-icon"><i class="fab fa-weixin"></i></div>
        <div class="modal-title">加入一人公司孵化营<br>请支付 ¥3500</div>
        <div class="qr-container">
            <!-- 微信收款二维码（永久权益专属，紧凑展示） -->
            <img id="wechatQrImg" class="qr-img" src="https://1rengs.com/img/wechat-pay.jpg" alt="微信收款码">
        </div>
        <div class="wechat-id">
            <i class="fab fa-weixin"></i> 微信号：<strong>19902364771</strong>
            <button class="copy-btn" id="copyWechatBtn"><i class="far fa-copy"></i> 复制</button>
        </div>
        <div class="modal-note">
            <i class="fas fa-info-circle"></i> 请使用微信扫码或添加微信号，备注“孵化营”<br>付款后即可获得三大永久权益
        </div>
    </div>
</div>

<script>
    // ========== 福利区域专用交互：模态框打开/关闭 + 复制微信号（紧凑版保留所有功能） ==========
    (function() {
        // 获取元素
        const modal = document.getElementById("paymentModal");
        const openBtn = document.getElementById("openPaymentModalBtn");
        const closeBtn = document.getElementById("closeModalBtn");
        const copyBtn = document.getElementById("copyWechatBtn");
        const wechatId = "19902364771";

        // 打开模态框
        if (openBtn) {
            openBtn.addEventListener("click", (e) => {
                e.preventDefault();
                if (modal) modal.style.display = "flex";
            });
        }

        // 关闭模态框：点击X
        if (closeBtn) {
            closeBtn.addEventListener("click", () => {
                if (modal) modal.style.display = "none";
            });
        }

        // 点击模态框背景关闭
        if (modal) {
            window.addEventListener("click", (e) => {
                if (e.target === modal) modal.style.display = "none";
            });
        }

        // 复制微信号功能（轻提示更紧凑）
        if (copyBtn) {
            copyBtn.addEventListener("click", () => {
                navigator.clipboard.writeText(wechatId).then(() => {
                    const originalText = copyBtn.innerHTML;
                    copyBtn.innerHTML = '<i class="fas fa-check"></i> 已复制';
                    setTimeout(() => {
                        copyBtn.innerHTML = originalText;
                    }, 1300);
                }).catch(() => {
                    alert("请手动复制微信号：" + wechatId);
                });
            });
        }
    })();
</script>
</body>
</html>
