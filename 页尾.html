<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>一人公司孵化营 | 永久福利与全球企业库</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== 全局样式 & 重置 — 更紧凑，无背景色 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 网页完全无背景：纯白极简，符合“没有背景”要求 */
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #ffffff;      /* 纯白背景，彻底移除原灰度渐变背景 */
            color: #1e2a3e;
            line-height: 1.4;
            padding: 0 16px 24px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            width: 100%;
        }

        /* ========== 底部福利区域 — 紧凑但保留清晰卡片感 ========== */
        .benefits-footer {
            margin-top: 1.2rem;
            background: #ffffff;
            border-radius: 28px;
            padding: 1.2rem 1rem 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            border: 1px solid #eef2f8;
            transition: all 0.2s;
        }

        .benefits-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 1.35rem;
            font-weight: 700;
            color: #1a4c6e;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
            text-align: center;
            letter-spacing: -0.2px;
        }
        .benefits-title i {
            font-size: 1.7rem;
            color: #f5b042;
        }
        .benefits-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.4rem;
        }
        .benefit-card {
            flex: 1;
            min-width: 190px;
            background: #ffffff;
            border-radius: 24px;
            padding: 1rem 0.75rem;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            border: 1px solid #eef2f8;
            transition: transform 0.2s, border-color 0.2s;
        }
        .benefit-card:hover {
            transform: translateY(-3px);
            border-color: #cde0ed;
            box-shadow: 0 6px 14px rgba(0,0,0,0.04);
        }
        .benefit-icon {
            font-size: 2rem;
            color: #1f6392;
            margin-bottom: 0.7rem;
        }
        .benefit-card h4 {
            font-size: 1.05rem;
            font-weight: 700;
            color: #0f3b54;
            margin-bottom: 0.4rem;
        }
        .benefit-card p {
            font-size: 0.82rem;
            color: #4a6f8a;
            line-height: 1.35;
        }
        .benefits-cta {
            text-align: center;
            margin-top: 0.2rem;
        }
        .benefits-cta a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1f6392;
            color: white;
            padding: 8px 22px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(31,99,146,0.2);
            cursor: pointer;
            letter-spacing: 0.3px;
        }
        .benefits-cta a:hover {
            background: #0e4f74;
            transform: scale(1.01);
        }
        .copyright-row {
            text-align: center;
            margin-top: 1rem;
            padding-top: 0.9rem;
            border-top: 1px solid #dce5ec;
            font-size: 0.72rem;
            color: #6b8eaa;
            line-height: 1.4;
        }

        /* ========== 模态框 — 固定高度400px，二维码图片尺寸完全不变 ========== */
        .payment-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(3px);
        }
        /* 核心调整：弹窗面板高度固定为400px，二维码图片大小保持原值不变 */
        .modal-content {
            background: #fff;
            max-width: 360px;
            width: 90%;
            height: 400px;               /* 明确要求高度400px */
            border-radius: 28px;
            text-align: center;
            padding: 1rem 0.9rem 1.2rem; /* 紧凑内边距，为内容留足空间 */
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            position: relative;
            animation: fadeInUp 0.2s ease-out;
            overflow-y: auto;            /* 内容若略超400px可滚动，确保所有信息可见，二维码尺寸不变 */
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        /* 自定义滚动条美观 (不影响功能) */
        .modal-content::-webkit-scrollbar {
            width: 4px;
        }
        .modal-content::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .modal-content::-webkit-scrollbar-thumb {
            background: #c1c9d2;
            border-radius: 10px;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 1.4rem;
            cursor: pointer;
            color: #8b9aab;
            transition: color 0.2s;
            line-height: 1;
            z-index: 10;
        }
        .modal-close:hover {
            color: #1f6392;
        }
        .modal-icon {
            font-size: 2rem;            /* 微调保持视觉平衡 */
            color: #2c7cb6;
            margin-bottom: 0.3rem;
        }
        .modal-title {
            font-size: 1.18rem;
            font-weight: 700;
            color: #1a4c6e;
            margin-bottom: 0.3rem;
            line-height: 1.3;
        }
        .qr-container {
            background: #ffffff;
            padding: 8px;
            border-radius: 20px;
            margin: 0.6rem auto;
            display: inline-block;
            border: 1px solid #eef2f8;
        }
        /* 二维码图片尺寸保持原样：桌面宽180px/移动端稍小但比例不变（完全保留原先尺寸定义） */
        .qr-img {
            width: 180px;
            height: 180px;
            display: block;
            margin: 0 auto;
            background: #f8fafc;
            border-radius: 14px;
            object-fit: cover;
        }
        .wechat-id {
            background: #f1f5f9;
            border-radius: 48px;
            padding: 6px 14px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e4663;
            margin: 0.4rem 0 0.3rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .wechat-id i {
            font-size: 1rem;
            color: #2c9b77;
        }
        .copy-btn {
            background: #eef2f6;
            border: none;
            padding: 4px 10px;
            border-radius: 32px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
            color: #1f6392;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .copy-btn:hover {
            background: #d4dfe8;
        }
        .modal-note {
            font-size: 0.69rem;
            color: #6b8eaa;
            margin-top: 8px;
            line-height: 1.3;
            padding-bottom: 4px;
        }

        /* ========== 响应式：二维码图片尺寸严格不变（移动端依然保持原有尺寸逻辑，无更改） ========== */
        @media (max-width: 640px) {
            body {
                padding: 0 12px 16px;
            }
            .benefits-footer {
                padding: 1rem 0.9rem 1.2rem;
                margin-top: 0.8rem;
            }
            .benefits-title {
                font-size: 1.2rem;
                gap: 6px;
                margin-bottom: 1rem;
            }
            .benefits-title i {
                font-size: 1.4rem;
            }
            .benefits-grid {
                gap: 0.85rem;
                flex-direction: column;
                align-items: center;
            }
            .benefit-card {
                width: 100%;
                max-width: 300px;
                padding: 0.85rem 0.6rem;
            }
            .benefit-icon {
                font-size: 1.8rem;
                margin-bottom: 0.5rem;
            }
            .benefit-card h4 {
                font-size: 1rem;
            }
            .benefit-card p {
                font-size: 0.75rem;
            }
            .benefits-cta a {
                padding: 6px 18px;
                font-size: 0.85rem;
            }
            .copyright-row {
                font-size: 0.65rem;
                margin-top: 0.8rem;
                padding-top: 0.7rem;
            }
            /* 移动端弹窗高度依然是400px，二维码图片保持原有尺寸（不缩小） */
            .modal-content {
                max-width: 340px;
                height: 400px;          /* 固定高度不变 */
                padding: 0.9rem 0.8rem 1rem;
            }
            /* 二维码图片完全保持原本大小 180px? 因移动端屏幕小可能溢出容器，但依然保证尺寸不缩放：设定宽180可能导致容器溢出？但移动端容器宽约90%即300px左右，180px完全正常显示且不变形，满足“图片大小不变” */
            .qr-img {
                width: 180px;
                height: 180px;
            }
            .wechat-id {
                font-size: 0.8rem;
                padding: 4px 12px;
            }
            .modal-title {
                font-size: 1.05rem;
            }
        }

        /* 小屏手机（如宽度<480），仍保持二维码图片180px不变，但为免超出可视区略微调整容器滚动即可，不做尺寸缩减 */
        @media (max-width: 480px) {
            .qr-img {
                width: 180px;
                height: 180px;
            }
            .modal-content {
                max-width: 320px;
                padding: 0.85rem 0.7rem 1rem;
            }
            .wechat-id {
                font-size: 0.75rem;
                gap: 6px;
            }
            .modal-note {
                font-size: 0.65rem;
            }
        }
        /* 对于极小设备保证180px二维码完全居中且不溢出，滚动查看即可，满足要求 */
        @media (max-width: 380px) {
            .qr-img {
                width: 180px;
                height: 180px;
            }
            .modal-content {
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 一人公司孵化营福利区块（紧凑设计） -->
    <div class="benefits-footer">
        <div class="benefits-title">
            <i class="fas fa-rocket"></i> 
            <span>加入一人公司孵化营，获得3大永久福利</span>
            <i class="fas fa-gem"></i>
        </div>
        <div class="benefits-grid">
            <div class="benefit-card">
                <div class="benefit-icon"><i class="fas fa-infinity"></i></div>
                <h4>永久免费使用token</h4>
                <p>AI调用额度永不过期，赋能一人公司自动化运营</p>
            </div>
            <div class="benefit-card">
                <div class="benefit-icon"><i class="fas fa-database"></i></div>
                <h4>共享全球企业信息库</h4>
                <p>海量海外企业名录、海关数据实时更新，精准拓客</p>
            </div>
            <div class="benefit-card">
                <div class="benefit-icon"><i class="fas fa-microchip"></i></div>
                <h4>一人公司全套AI系统及主机</h4>
                <p>轻量化AI工具链 + 本地主机，零基础快速起步</p>
            </div>
        </div>
        <div class="benefits-cta">
            <a id="openPaymentModalBtn"><i class="fas fa-hand-peace"></i> 立即了解详情 →</a>
        </div>
        <div class="copyright-row">
            <i class="fas fa-chart-line"></i> 数据持续更新 · 链接直达全球名录 · 建议配合LinkedIn/谷歌深度背调<br>
            © 外贸拓客工具集 | 助您精准开发全球客户
        </div>
    </div>
</div>

<!-- 微信支付弹窗：高度严格400px，二维码图片大小不变（180x180，移动端也维持此尺寸） -->
<div id="paymentModal" class="payment-modal">
    <div class="modal-content">
        <span class="modal-close" id="closeModalBtn">&times;</span>
        <div class="modal-icon"><i class="fab fa-weixin"></i></div>
        <div class="modal-title">加入一人公司孵化营<br>请支付 ¥3500</div>
        <div class="qr-container">
            <!-- 微信收款二维码（尺寸绝对不变，始终180x180） -->
            <img id="wechatQrImg" class="qr-img" src="https://1rengs.com/img/wechat-pay.jpg" alt="微信收款码">
        </div>
        <div class="wechat-id">
            <i class="fab fa-weixin"></i> 微信号：<strong>19902364771</strong>
            <button class="copy-btn" id="copyWechatBtn"><i class="far fa-copy"></i> 复制</button>
        </div>
        <div class="modal-note">
            <i class="fas fa-info-circle"></i> 请使用微信扫码或添加微信号，备注“孵化营”<br>付款后即可获得三大永久权益
        </div>
    </div>
</div>

<script>
    // ========== 福利区域交互：模态框打开/关闭 + 复制微信号，弹窗高度固定400px并保留二维码尺寸 ==========
    (function() {
        const modal = document.getElementById("paymentModal");
        const openBtn = document.getElementById("openPaymentModalBtn");
        const closeBtn = document.getElementById("closeModalBtn");
        const copyBtn = document.getElementById("copyWechatBtn");
        const wechatId = "19902364771";

        // 打开模态框
        if (openBtn) {
            openBtn.addEventListener("click", (e) => {
                e.preventDefault();
                if (modal) modal.style.display = "flex";
            });
        }

        // 关闭模态框：点击X
        if (closeBtn) {
            closeBtn.addEventListener("click", () => {
                if (modal) modal.style.display = "none";
            });
        }

        // 点击模态框背景关闭
        if (modal) {
            window.addEventListener("click", (e) => {
                if (e.target === modal) modal.style.display = "none";
            });
        }

        // 复制微信号功能（紧凑提示）
        if (copyBtn) {
            copyBtn.addEventListener("click", () => {
                navigator.clipboard.writeText(wechatId).then(() => {
                    const originalText = copyBtn.innerHTML;
                    copyBtn.innerHTML = '<i class="fas fa-check"></i> 已复制';
                    setTimeout(() => {
                        copyBtn.innerHTML = originalText;
                    }, 1300);
                }).catch(() => {
                    alert("请手动复制微信号：" + wechatId);
                });
            });
        }
    })();
</script>
</body>
</html>
